<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Update Employee | MSD</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background: linear-gradient(to right,#ffd6d6,#fff0f0);
}

.header{
background:#2c3e50;
color:white;
padding:15px;
display:flex;
align-items:center;
}

.logo{
font-size:20px;
font-weight:bold;
margin-left:10px;
}

.title{
font-size:18px;
margin-left:290px;
}

.logout{
margin-left:auto;
margin-right:20px;
}

.logout a{
color:white;
text-decoration:none;
background:#e74c3c;
padding:8px 15px;
border-radius:5px;
}

.logout a:hover{
background:#c0392b;
}

.container{
display:flex;
justify-content:center;
align-items:center;
height:80vh;
}

.box{
width:400px;
background:white;
padding:35px;
border-radius:12px;
box-shadow:0 8px 25px rgba(0,0,0,0.2);
text-align:center;
}

h2{
color:#333;
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
margin:15px 0;
border-radius:6px;
border:1px solid #ccc;
font-size:14px;
}

button{
width:100%;
padding:12px;
background:#ff4d4d;
color:white;
border:none;
border-radius:6px;
font-size:16px;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#e60000;
}

.back{
display:block;
margin-top:15px;
text-decoration:none;
color:#555;
}

.footer{
position:fixed;
bottom:0;
width:100%;
background:#2c3e50;
color:white;
text-align:center;
padding:15px;
font-size:14px;
}

</style>

</head>

<body>

<div class="header">
<div class="logo">💼 Employee Payroll System</div>
<div class="title">Update Employee</div>
<div class="logout">
<a href="index.html">Logout</a>
</div>
</div>

<div class="container">

<div class="box">

<h2>Search Employee</h2>

<form action="updateEmployee" method="get">

<input type="number" name="id" placeholder="Enter Employee ID" required>

<button type="submit">Search Employee</button>

</form>

<a href="dashboard.html" class="back">⬅ Back to Dashboard</a>

</div>

</div>

<div class="footer">
Employee Management System
</div>

</body>
</html>
