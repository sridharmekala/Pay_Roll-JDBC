
<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>Employee Payroll Login | MSD</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background: linear-gradient(to right,#4facfe,#00f2fe);
}

.header{
background:#2c3e50;
color:white;
padding:15px;
text-align:center;
font-size:20px;
font-weight:bold;
}

.container{
width:380px;
margin:100px auto;
background:white;
padding:30px;
border-radius:12px;
box-shadow:0 5px 20px rgba(0,0,0,0.25);
text-align:center;
}

h2{
margin-bottom:20px;
color:#333;
}

.input-box{
position:relative;
margin:15px 0;
}

.input-box input{
width:100%;
padding:12px 40px;
border-radius:6px;
border:1px solid #ccc;
font-size:14px;
box-sizing:border-box;
}

.icon{
position:absolute;
left:10px;
top:12px;
}

button{
width:100%;
padding:12px;
background:#4facfe;
border:none;
color:white;
border-radius:6px;
font-size:16px;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#0077ff;
}

.demo-hint{
margin-top:15px;
font-size:14px;
color:#555;
cursor:pointer;
}

.demo-hint span{

}

.demo-box{
display:none;
margin-top:10px;
background:#f8f9fa;
padding:10px;
border-radius:6px;
font-size:13px;
color:#333;
}

.footer{
position:fixed;
bottom:0;
width:100%;
background:#2c3e50;
color:white;
text-align:center;
padding:12px;
}

</style>

</head>

<body>

<div class="header">
💼 Employee Payroll System
</div>

<div class="container">

<h2>Admin Login</h2>

<form action="login" method="post">

<div class="input-box">
<span class="icon">👤</span>
<input type="text" name="username" placeholder="Enter Username" required>
</div>

<div class="input-box">
<span class="icon">🔒</span>
<input type="password" name="password" placeholder="Enter Password" required>
</div>

<button type="submit">Login</button>

</form>
<div class="demo-hint">
    <span onclick="toggleDemo()">🔐 Demo Login</span>

    <div id="demoBox" class="demo-box">
        Username: <b>admin</b><br>
        Password: <b>admin123</b>
    </div>
</div>

</div>


<div class="footer">
Secure Employee Management System
</div>

</body>

<script>
function toggleDemo(){
    var box = document.getElementById("demoBox");
    if(box.style.display === "none"){
        box.style.display = "block";
    } else {
        box.style.display = "none";
    }
}
</script>

</html>
