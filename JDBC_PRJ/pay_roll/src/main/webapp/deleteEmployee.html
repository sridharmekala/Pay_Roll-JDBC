<!DOCTYPE html>
<html>
<head>
<title>Delete Employee | MSD</title>

<style>

body{
font-family: Arial;
background: linear-gradient(to right,#ff512f,#dd2476);
}

.box{
width:400px;
margin:150px auto;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 0 15px gray;
text-align:center;
}

input{
width:90%;
padding:10px;
margin:10px;
}

button{
width:95%;
padding:10px;
background:red;
color:white;
border:none;
border-radius:5px;
}

</style>
</head>

<body>

<div class="box">

<h2>Delete Employee</h2>

<form action="deleteEmployee" method="get">

<input type="number" name="id" placeholder="Enter Employee ID">

<button type="submit">Delete Employee</button>

</form>

</div>

</body>
</html>
